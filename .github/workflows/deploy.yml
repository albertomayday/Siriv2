name: Deploy to GitHub Pages

on:
  push:
    branches: [ pwa-no-electron ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout pwa-no-electron
          rm -rf index.html styles main.css app.js database.js manifest.json sw.js favicon.ico icon-192.png icon-512.png
          git show origin/main:tpv-inventario.html > index.html
          git add .
          git commit -m "Deploy PWA with standalone HTML from configurator" || echo "No changes to commit"
          git push origin pwa-no-electron